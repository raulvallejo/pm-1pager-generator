<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1Pager — AI-Powered PM 1-Pager Generator</title>

    <!--
      Google Fonts — Inter
      Inter is loaded here in <head> so it's available before the first paint,
      preventing a flash of fallback font. The `display=swap` param means the
      browser shows a fallback font immediately and swaps to Inter once loaded,
      keeping the page usable even on slow connections.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
